<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="bpaas-design-system" content="brutalist-avantgarde">
    <meta name="bpaas-design-theme" content="kr-neon-void">
    <title>마포 마사지 링크 블로그 | 형들을 위한 진짜 마사지 정보</title>
    <meta name="description" content="마포 마사지 링크 블로그: 마사지 고를 때 놓치는 꿀팁, 실제 형들의 경험담, 가격 비교 요령까지. 브로들이 인정한 마사지 정보를 확인해.">
    <meta name="keywords" content="마포 마사지, 마포 마사지 링크, 마사지 블로그, 마사지 후기, 마사지 추천">
    <link rel="canonical" href="https://t3b05-mp-massage-link-2.vercel.app/blog">
    <meta property="og:title" content="마포 마사지 링크 블로그 | 형들을 위한 진짜 마사지 정보">
    <meta property="og:description" content="마포 마사지 링크 블로그: 마사지 고를 때 놓치는 꿀팁, 실제 형들의 경험담, 가격 비교 요령까지.">
    <meta property="og:image" content="https://t3b05-mp-massage-link-2.vercel.app/assets/og-blog.jpg">
    <meta property="og:url" content="https://t3b05-mp-massage-link-2.vercel.app/blog">
    <meta property="og:type" content="article">
    <style>
        /* ============================================
           BRUTALIST-AVANTGARDE + KR-NEON-VOID 디자인 시스템
           ============================================ */
        :root {
            --bg: #0d0d0d;
            --bg2: #1a1a1a;
            --text: #e0e0e0;
            --text-dim: #7a7a7a;
            --accent: #ff0040;
            --accent2: #00f0ff;
            --border: #333;
            --font: 'Space Mono', 'Courier New', monospace;
            --font-head: 'Space Mono', monospace;
            --spacing: 1.2rem;
            --max-width: 1100px;
            --box-shadow: 4px 4px 0 var(--accent);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: var(--font);
            line-height: 1.7;
            font-size: 16px;
            padding: 1rem;
            min-height: 100vh;
        }

        a {
            color: var(--accent2);
            text-decoration: underline wavy 2px;
            transition: color 0.2s;
        }

        a:hover {
            color: #fff;
            text-decoration: underline solid 2px;
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
            border: 3px solid var(--border);
            filter: grayscale(30%) contrast(1.1);
        }

        h1, h2, h3, h4 {
            font-family: var(--font-head);
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        h1 {
            font-size: 2.2rem;
            color: var(--accent);
            border-left: 6px solid var(--accent);
            padding-left: 1rem;
            margin: 2rem 0 1.5rem;
        }

        h2 {
            font-size: 1.6rem;
            color: var(--accent2);
            border-bottom: 2px dashed var(--accent2);
            padding-bottom: 0.5rem;
            margin: 2.5rem 0 1rem;
        }

        h3 {
            font-size: 1.2rem;
            color: var(--text);
            margin: 1.5rem 0 0.8rem;
        }

        p {
            margin: 1rem 0;
        }

        blockquote {
            border-left: 6px solid var(--accent);
            background: var(--bg2);
            padding: 1rem 1.5rem;
            margin: 1.5rem 0;
            font-style: italic;
            color: var(--text-dim);
            box-shadow: 2px 2px 0 var(--border);
        }

        ul, ol {
            margin: 1rem 0 1rem 2rem;
        }

        li {
            margin-bottom: 0.5rem;
        }

        hr {
            border: 1px solid var(--border);
            margin: 2rem 0;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ---- HEADER / NAV ---- */
        header {
            background: var(--bg2);
            border-bottom: 4px solid var(--accent);
            padding: 1rem 0;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 0 rgba(255, 0, 64, 0.3);
        }

        .header-inner {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 0 1rem;
        }

        .site-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .site-title a {
            color: inherit;
            text-decoration: none;
        }

        /* Hamburger menu base */
        .nav-toggle {
            display: none;
            background: none;
            border: 2px solid var(--accent);
            color: var(--accent);
            font-size: 1.5rem;
            padding: 0.3rem 0.8rem;
            cursor: pointer;
            font-family: var(--font);
        }

        .nav-toggle:focus {
            outline: 2px dashed var(--accent2);
        }

        nav {
            display: flex;
            gap: 2rem;
            align-items: center;
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 0.1em;
            border-bottom: 2px solid transparent;
            padding-bottom: 4px;
            transition: border-bottom 0.2s, color 0.2s;
        }

        nav a:hover, nav a.active {
            border-bottom: 2px solid var(--accent);
            color: var(--accent);
        }

        nav a.active {
            font-weight: bold;
            background: var(--accent);
            color: var(--bg);
            padding: 0.2rem 0.6rem;
            border: none;
        }

        /* ---- FOOTER ---- */
        footer {
            background: var(--bg2);
            border-top: 4px solid var(--accent);
            padding: 1.5rem 0;
            margin-top: 3rem;
            text-align: center;
            color: var(--text-dim);
            font-size: 0.85rem;
        }

        footer a {
            color: var(--accent2);
        }

        /* ---- CARD (generic) ---- */
        .card {
            background: var(--bg2);
            border: 2px solid var(--border);
            padding: 1.5rem;
            margin: 1rem 0;
            box-shadow: var(--box-shadow);
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--accent);
            margin-bottom: 0.8rem;
        }

        /* ---- FAQ ---- */
        .faq-item {
            border-bottom: 1px solid var(--border);
            padding: 1rem 0;
        }

        .faq-item:last-child {
            border-bottom: none;
        }

        .faq-q {
            font-weight: bold;
            color: var(--accent2);
            margin-bottom: 0.5rem;
        }

        .faq-a {
            color: var(--text-dim);
        }

        /* ---- POST META ---- */
        .post-meta {
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            padding: 0.6rem 0;
            margin: 1rem 0 2rem;
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .post-meta span {
            display: inline-block;
        }

        .post-image {
            margin: 2rem 0;
            border: 4px solid var(--accent);
            box-shadow: 6px 6px 0 var(--border);
        }

        .post-image figcaption {
            background: var(--bg2);
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        /* ---- RESPONSIVE 768 ---- */
        @media screen and (max-width: 768px) {
            body {
                font-size: 15px;
                padding: 0.8rem;
            }

            h1 {
                font-size: 1.6rem;
                padding-left: 0.8rem;
            }

            h2 {
                font-size: 1.3rem;
            }

            .header-inner {
                flex-wrap: wrap;
                padding: 0.5rem 1rem;
            }

            .nav-toggle {
                display: block; /* hamburger visible */
            }

            nav {
                display: none; /* hidden by default */
                flex-direction: column;
                width: 100%;
                background: var(--bg2);
                padding: 1rem 0;
                gap: 1rem;
                border-top: 2px solid var(--accent);
                margin-top: 0.5rem;
            }

            nav.open {
                display: flex; /* shown when toggled (JS) */
            }

            nav a {
                text-align: center;
                padding: 0.5rem 0;
                border-bottom: 1px solid var(--border);
            }

            .container {
                padding: 0 0.5rem;
            }

            .post-meta {
                flex-direction: column;
                gap: 0.3rem;
            }

            .faq-item {
                padding: 0.8rem 0;
            }
        }

        /* ---- UTILITY ---- */
        .text-accent {
            color: var(--accent);
        }

        .text-muted {
            color: var(--text-dim);
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: var(--bg);
            font-family: var(--font);
            font-weight: bold;
            padding: 0.6rem 1.5rem;
            text-transform: uppercase;
            border: 3px solid var(--accent);
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
        }

        .btn:hover {
            background: transparent;
            color: var(--accent);
            border: 3px solid var(--accent);
        }

        .btn-secondary {
            background: var(--bg2);
            color: var(--accent2);
            border-color: var(--accent2);
        }

        .btn-secondary:hover {
            background: var(--accent2);
            color: var(--bg);
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <div class="site-title"><a href="/">마포 마사지 링크</a></div>
            <button class="nav-toggle" aria-label="메뉴 열기" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
            <nav>
                <a href="/">홈</a>
                <a href="/blog" class="active">블로그</a>
                <a href="/about">소개</a>
</body>
</html>
